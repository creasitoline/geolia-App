<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoLiA | Gestione</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --blu: #3b5998; 
            --giallo: #ffc107; 
            --viola: #6f42c1; 
            --bg: #f8f9fa; 
        }
        body { font-family: 'Segoe UI', system-ui; margin: 0; background: var(--bg); padding-bottom: 90px; }
        
        /* Header Moderno */
        header { background: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--blu); }
        .logo-text { font-weight: bold; color: var(--blu); font-size: 1.5rem; }
        
        /* FAB Colorato */
        .fab { position: fixed; bottom: 80px; right: 20px; width: 65px; height: 65px; background: var(--viola); color: white; border-radius: 50%; border: none; font-size: 28px; box-shadow: 0 4px 15px rgba(111, 66, 193, 0.4); z-index: 100; transition: transform 0.2s; }
        .fab:active { transform: scale(0.9); }
        
        /* Menu Bottom Moderno */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid var(--blu); z-index: 90; }
        .nav-item { text-decoration: none; color: var(--blu); text-align: center; flex: 1; font-size: 10px; font-weight: 600; }
        .nav-item i { display: block; font-size: 1.4rem; margin-bottom: 3px; color: var(--blu); }

        /* Modale Moderna */
        .modal { position: fixed; bottom: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 500; align-items: flex-end; }
        .modal-content { background: white; width: 100%; max-width: 400px; margin: 0 auto; padding: 25px; border-radius: 25px 25px 0 0; max-height: 85vh; overflow-y: auto; border-top: 5px solid var(--giallo); }
        
        .form-input { width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; outline: none; transition: border 0.3s; }
        .form-input:focus { border-color: var(--blu); }
        
        .btn-action { padding: 14px; border: none; border-radius: 12px; background: #f0f0f0; color: #333; cursor: pointer; font-weight: bold; width: 100%; margin: 6px 0; transition: 0.3s; }
        .btn-pubblica { background: var(--viola); color: white; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <span class="logo-text">GeoLiA</span>
        <i class="fa-solid fa-user-circle" style="color: var(--blu); font-size: 1.5rem;"></i>
    </header>

    <div id="feed" style="padding:15px;"><h3>Feed Locali</h3></div>

    <button class="fab" onclick="document.getElementById('modalForm').style.display='flex'">+</button>

    <nav class="nav-bottom">
        <a class="nav-item"><i class="fa-solid fa-house"></i>Home</a>
        <a class="nav-item"><i class="fa-solid fa-filter"></i>Filtri</a>
        <a class="nav-item"><i class="fa-solid fa-map-marked-alt"></i>Mappa</a>
        <a class="nav-item"><i class="fa-solid fa-user"></i>Profilo</a>
        <a class="nav-item" style="color: var(--viola);"><i class="fa-solid fa-robot"></i>GeoAI</a>
    </nav>

    <div id="modalForm" class="modal">
        <div class="modal-content">
            <div id="step1">
                <h3 style="color: var(--blu);">Cosa pubblichi oggi?</h3>
                <select id="catSelect" class="form-input">
                    <option value="offerte">🏷️ Offerte</option>
                    <option value="menu">🍽️ Menu del Giorno</option>
                    <option value="marketplace">📦 Marketplace</option>
                    <option value="guasto">🛠️ Segnala Guasto</option>
                </select>
                <button class="btn-action" onclick="document.getElementById('cameraInput').click()"><i class="fa-solid fa-camera"></i> Scatta Foto</button>
                <button class="btn-action" onclick="document.getElementById('fileInput').click()"><i class="fa-solid fa-image"></i> Scegli dalla Galleria</button>
            </div>

            <div id="step2" class="hidden">
                <img id="preview" style="width:100%; border-radius:15px; margin-bottom:15px; border: 2px solid var(--giallo);">
                <input type="text" id="titolo" class="form-input" placeholder="Titolo">
                <textarea id="descrizione" class="form-input" placeholder="Descrizione"></textarea>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="prezzo" class="form-input" placeholder="Prezzo">
                    <select id="valuta" class="form-input" style="width:auto;"><option>CHF</option><option>EUR</option></select>
                </div>
                <button class="btn-action btn-pubblica" onclick="confermaInvio()">✅ Pubblica con AI</button>
                <button class="btn-action" onclick="location.reload()">❌ Annulla</button>
            </div>
        </div>
    </div>

    <input type="file" id="cameraInput" class="hidden" accept="image/*" capture="environment" onchange="gestisciFoto(event)">
    <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="gestisciFoto(event)">

    <script type="module">
        // La logica di invio rimane quella che hai validato su Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-storage.js";

        // ... (configurazione Firebase invariata) ...
        
        window.gestisciFoto = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('preview').src = ev.target.result;
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        };
        
        window.confermaInvio = async () => { /* Logica di invio confermata */ };
    </script>
</body>
</html>
