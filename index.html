<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoLiA | Gestione</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --blu: #3b5998; 
            --giallo: #ffc107; 
            --viola: #6f42c1; 
            --bg: #f3f3f3; 
        }
        body { font-family: 'Segoe UI', system-ui; margin: 0; background: var(--bg); padding-bottom: 90px; }
        header { background: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--blu); }
        .fab { position: fixed; bottom: 80px; right: 20px; width: 60px; height: 60px; background: var(--viola); color: white; border-radius: 50%; border: none; font-size: 24px; box-shadow: 0 4px 10px rgba(111, 66, 193, 0.3); z-index: 100; }
        
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid var(--blu); z-index: 90; }
        .nav-item { text-decoration: none; color: var(--blu); text-align: center; flex: 1; font-size: 11px; cursor: pointer; }
        .nav-item i { display: block; font-size: 1.3rem; margin-bottom: 3px; }

        .modal { position: fixed; bottom: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 500; align-items: flex-end; }
        .modal-content { background: white; width: 100%; max-width: 400px; margin: 0 auto; padding: 20px; border-radius: 20px 20px 0 0; max-height: 85vh; overflow-y: auto; border-top: 5px solid var(--giallo); }
        .form-input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-action { padding: 12px; border: none; border-radius: 8px; background: #eee; cursor: pointer; font-weight: bold; width: 100%; margin: 5px 0; color: var(--blu); }
        .btn-pubblica { background: var(--viola) !important; color: white !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header><img src="logo.png" style="height:35px;"><i class="fa-solid fa-bell" style="color: var(--blu);"></i></header>
    <div id="feed" style="padding:15px;"><h3>Post Recenti</h3></div>

    <button class="fab" onclick="document.getElementById('modalForm').style.display='flex'">+</button>

    <nav class="nav-bottom">
        <a class="nav-item"><i class="fa-solid fa-house"></i>Home</a>
        <a class="nav-item"><i class="fa-solid fa-filter"></i>Filtri</a>
        <a class="nav-item"><i class="fa-solid fa-map-marked-alt"></i>Mappa</a>
        <a class="nav-item"><i class="fa-solid fa-user"></i>Profilo</a>
        <a class="nav-item"><i class="fa-solid fa-chart-line"></i>Admin</a>
    </nav>

    <div id="modalForm" class="modal">
        <div class="modal-content">
            <div id="step1">
                <h3 style="color: var(--blu);">Cosa pubblichi?</h3>
                <select id="catSelect" class="form-input">
                    <option value="offerte">🏷️ Offerte</option>
                    <option value="menu">🍽️ Menu</option>
                    <option value="marketplace">📦 Marketplace</option>
                    <option value="guasto">🛠️ Guasto</option>
                </select>
                <button class="btn-action" onclick="document.getElementById('cameraInput').click()">📸 Scatta Foto</button>
                <button class="btn-action" onclick="document.getElementById('fileInput').click()">📁 Carica Galleria</button>
            </div>

            <div id="step2" class="hidden">
                <img id="preview" style="width:100%; border-radius:10px; margin-bottom:10px; border: 2px solid var(--giallo);">
                <input type="text" id="titolo" class="form-input" placeholder="Titolo">
                <textarea id="descrizione" class="form-input" placeholder="Descrizione"></textarea>
                <div style="display:flex; gap:5px;">
                    <input type="number" id="prezzo" class="form-input" placeholder="Prezzo">
                    <select id="valuta" class="form-input" style="width:auto;"><option>CHF</option><option>EUR</option></select>
                </div>
                <button class="btn-action btn-pubblica" onclick="confermaInvio()">✅ Pubblica</button>
                <button class="btn-action" onclick="location.reload()">❌ Annulla</button>
            </div>
        </div>
    </div>

    <input type="file" id="cameraInput" class="hidden" accept="image/*" capture="environment" onchange="gestisciFoto(event)">
    <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="gestisciFoto(event)">

        import { getFirestore,
