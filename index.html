<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geolia | Gestione</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #ffffff; --accent: #2ecc71; --bg: #f3f3f3; }
        body { font-family: 'Segoe UI', system-ui; margin: 0; background: var(--bg); padding-bottom: 90px; }
        header { background: var(--primary); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .fab { position: fixed; bottom: 80px; right: 20px; width: 60px; height: 60px; background: var(--accent); color: white; border-radius: 50%; border: none; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 100; }
        
        /* Barra Navigazione Inferiore (Ripristinata) */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; z-index: 90; }
        .nav-item { text-decoration: none; color: #555; text-align: center; flex: 1; font-size: 11px; cursor: pointer; }
        .nav-item i { display: block; font-size: 1.3rem; margin-bottom: 3px; }

        /* Modale */
        .modal { position: fixed; bottom: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 500; align-items: flex-end; }
        .modal-content { background: white; width: 100%; max-width: 400px; margin: 0 auto; padding: 20px; border-radius: 20px 20px 0 0; max-height: 85vh; overflow-y: auto; }
        .form-input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-action { padding: 12px; border: none; border-radius: 8px; background: #eee; cursor: pointer; font-weight: bold; width: 100%; margin: 5px 0; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header><img src="logo.png" style="height:35px;"><i class="fa-solid fa-bell"></i></header>
    <div id="feed" style="padding:15px;"><h3>Post Recenti</h3></div>

    <button class="fab" onclick="document.getElementById('modalForm').style.display='flex'">+</button>

    <nav class="nav-bottom">
        <a class="nav-item"><i class="fa-solid fa-house"></i>Home</a>
        <a class="nav-item"><i class="fa-solid fa-filter"></i>Filtri</a>
        <a class="nav-item"><i class="fa-solid fa-map-marked-alt"></i>Mappa</a>
        <a class="nav-item"><i class="fa-solid fa-user"></i>Profilo</a>
        <a class="nav-item"><i class="fa-solid fa-chart-line"></i>Admin</a>
    </nav>

    <div id="modalForm" class="modal">
        <div class="modal-content">
            <div id="step1">
                <h3>Cosa pubblichi?</h3>
                <select id="catSelect" class="form-input">
                    <option value="offerte">🏷️ Offerte</option>
                    <option value="menu">🍽️ Menu</option>
                    <option value="marketplace">📦 Marketplace</option>
                    <option value="guasto">🛠️ Guasto</option>
                </select>
                <button class="btn-action" onclick="document.getElementById('cameraInput').click()">📸 Scatta Foto</button>
                <button class="btn-action" onclick="document.getElementById('fileInput').click()">📁 Carica Galleria</button>
            </div>

            <div id="step2" class="hidden">
                <img id="preview" style="width:100%; border-radius:10px; margin-bottom:10px;">
                <input type="text" id="titolo" class="form-input" placeholder="Titolo">
                <textarea id="descrizione" class="form-input" placeholder="Descrizione"></textarea>
                <div style="display:flex; gap:5px;">
                    <input type="number" id="prezzo" class="form-input" placeholder="Prezzo">
                    <select id="valuta" class="form-input" style="width:auto;"><option>CHF</option><option>EUR</option></select>
                </div>
                <button class="btn-action" style="background:var(--accent); color:white;" onclick="confermaInvio()">✅ Pubblica</button>
                <button class="btn-action" onclick="location.reload()">❌ Annulla</button>
            </div>
        </div>
    </div>

    <input type="file" id="cameraInput" class="hidden" accept="image/*" capture="environment" onchange="gestisciFoto(event)">
    <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="gestisciFoto(event)">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-storage.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDAJIxBD8qGO6h8lAZeLnotm7GySpZrz_8",
            authDomain: "geolia-app.firebaseapp.com",
            projectId: "geolia-app",
            storageBucket: "geolia-app.firebasestorage.app",
            messagingSenderId: "341223455235",
            appId: "1:341223455235:web:6baa3fd3b9db6eaa22ec36",
            measurementId: "G-7SPH65RFH7"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        let fileTemporaneo = null;

        window.gestisciFoto = (e) => {
            fileTemporaneo = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('preview').src = ev.target.result;
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
            };
            reader.readAsDataURL(fileTemporaneo);
        };

        window.confermaInvio = async () => {
            if (!fileTemporaneo) return;
            try {
                const storageRef = ref(storage, 'segnalazioni/' + Date.now() + '_' + fileTemporaneo.name);
                const snapshot = await uploadBytes(storageRef, fileTemporaneo);
                const url = await getDownloadURL(snapshot.ref);

                await addDoc(collection(db, "posts"), {
                    categoria: document.getElementById('catSelect').value,
                    titolo: document.getElementById('titolo').value,
                    descrizione: document.getElementById('descrizione').value,
                    prezzo: document.getElementById('prezzo').value,
                    valuta: document.getElementById('valuta').value,
                    foto: url,
                    data: new Date().toISOString()
                });
                alert("Pubblicato con successo!");
                location.reload();
            } catch (error) {
                alert("Errore caricamento: " + error.message);
            }
        };
    </script>
</body>
</html>
