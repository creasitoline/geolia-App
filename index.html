<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geolia | Gestione</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #ffffff; --accent: #2ecc71; --bg: #f3f3f3; }
        body { font-family: 'Segoe UI', system-ui; margin: 0; background: var(--bg); padding-bottom: 90px; }
        header { background: var(--primary); padding: 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; }
        .card { background: white; padding: 20px; border-radius: 15px; margin: 15px; border: 1px solid #ddd; }
        .hidden { display: none !important; }
        .form-input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 10px; background: var(--accent); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <header><strong>GEOLIA</strong><i class="fa-solid fa-user-circle"></i></header>

    <div class="card">
        <h3>Nuovo Post</h3>
        <select id="catSelect" class="form-input">
            <option value="offerte">🏷️ Offerte</option>
            <option value="menu">🍽️ Menu del giorno</option>
            <option value="marketplace">📦 Marketplace</option>
            <option value="guasti">🛠️ Segnala Guasto</option>
        </select>

        <button id="btn-scatta" class="btn-action" onclick="document.getElementById('cameraInput').click()">
            <i class="fa-solid fa-camera"></i> Scatta Foto
        </button>
        <button class="btn-action" style="background: #555;" onclick="document.getElementById('fileInput').click()">
            <i class="fa-solid fa-folder"></i> Carica da Galleria
        </button>

        <div id="form-dati" class="hidden">
            <img id="preview" style="width:100%; border-radius:10px; margin: 15px 0;">
            <input type="text" id="titolo" class="form-input" placeholder="Titolo">
            <textarea id="descrizione" class="form-input" placeholder="Descrizione"></textarea>
            <div style="display:flex; gap:10px;">
                <input type="number" id="prezzo" class="form-input" placeholder="Prezzo">
                <select id="valuta" class="form-input" style="width:100px;"><option>CHF</option><option>EUR</option></select>
            </div>
            <button class="btn-action" onclick="confermaInvio()">✅ Conferma Pubblicazione</button>
            <button class="btn-action" style="background:#ff4757;" onclick="annullaTutto()">❌ Annulla</button>
        </div>
    </div>

    <input type="file" id="cameraInput" class="hidden" accept="image/*" capture="environment" onchange="gestisciFoto(event)">
    <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="gestisciFoto(event)">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-storage.js";

        // CONFIGURA CON I TUOI DATI
        const firebaseConfig = { /* ... */ }; 
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        
        let fileTemporaneo = null;

        window.gestisciFoto = (e) => {
            fileTemporaneo = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('preview').src = ev.target.result;
                document.getElementById('form-dati').classList.remove('hidden');
                document.getElementById('btn-scatta').classList.add('hidden');
            };
            reader.readAsDataURL(fileTemporaneo);
        };

        window.confermaInvio = async () => {
            const categoria = document.getElementById('catSelect').value;
            // STRUTTURA DINAMICA: la cartella nello storage dipende dalla categoria
            const storageRef = ref(storage, `posts/${categoria}/${Date.now()}_${fileTemporaneo.name}`);
            
            const snapshot = await uploadBytes(storageRef, fileTemporaneo);
            const url = await getDownloadURL(snapshot.ref);

            await addDoc(collection(db, "posts"), {
                categoria: categoria,
                titolo: document.getElementById('titolo').value,
                descrizione: document.getElementById('descrizione').value,
                prezzo: document.getElementById('prezzo').value,
                valuta: document.getElementById('valuta').value,
                urlFoto: url,
                data: new Date().toISOString()
            });
            alert("Pubblicato!");
            location.reload();
        };

        window.annullaTutto = () => location.reload();
    </script>
</body>
</html>
