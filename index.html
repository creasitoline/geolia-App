<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geolia | Gestione</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #2ecc71; }
        body { font-family: sans-serif; background: #f3f3f3; margin: 0; padding-bottom: 90px; }
        
        /* Modal Style */
        .modal { position: fixed; bottom: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 200; align-items: flex-end; }
        .modal-content { background: white; width: 100%; max-width: 400px; margin: 0 auto; padding: 20px; border-radius: 20px 20px 0 0; max-height: 90vh; overflow-y: auto; }
        
        .form-input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 10px; font-weight: bold; background: #eee; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <button class="fab" style="position: fixed; bottom: 80px; right: 20px; width: 60px; height: 60px; background: var(--accent); color: white; border-radius: 50%; border: none; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 100;" 
            onclick="document.getElementById('modalForm').style.display='flex'">+</button>

    <div id="modalForm" class="modal">
        <div class="modal-content">
            <div id="step1">
                <h3>Nuovo Post</h3>
                <select id="catSelect" class="form-input">
                    <option value="offerte">🏷️ Offerte</option>
                    <option value="menu">🍽️ Menu</option>
                    <option value="marketplace">📦 Marketplace</option>
                    <option value="guasto">🛠️ Guasto</option>
                </select>
                <button class="btn-action" onclick="document.getElementById('cameraInput').click()">📸 Scatta Foto</button>
                <button class="btn-action" onclick="document.getElementById('fileInput').click()">📁 Carica Galleria</button>
            </div>

            <div id="step2" class="hidden">
                <img id="preview" style="width:100%; border-radius:10px; margin-bottom:10px;">
                <input type="text" id="titolo" class="form-input" placeholder="Titolo">
                <textarea id="descrizione" class="form-input" placeholder="Descrizione"></textarea>
                
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="prezzo" class="form-input" placeholder="Prezzo">
                    <select id="valuta" class="form-input" style="width: 100px;">
                        <option value="CHF">CHF</option>
                        <option value="EUR">EUR</option>
                    </select>
                </div>
                
                <button class="btn-action" style="background:var(--accent); color:white;" onclick="pubblicaPost()">✅ Conferma</button>
                <button class="btn-action" onclick="location.reload()">❌ Annulla</button>
            </div>
        </div>
    </div>

    <input type="file" id="cameraInput" class="hidden" accept="image/*" capture="environment" onchange="gestisciAnteprima(event)">
    <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="gestisciAnteprima(event)">

    <script type="module">
        // ... (Logica Firebase) ...
        window.gestisciAnteprima = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('preview').src = ev.target.result;
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        };
        
        // La funzione pubblicaPost ora prenderà anche document.getElementById('valuta').value
    </script>
</body>
</html>
