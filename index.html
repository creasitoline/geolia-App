<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geolia | Gestione</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ... (Stili invariati) ... */
        .btn-dual { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-action { padding: 15px; border: none; border-radius: 10px; background: #eee; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="modalForm" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Nuovo Post</h3>
            
            <div id="step1">
                <select id="catSelect" class="form-input">
                    <option value="offerte">🏷️ Offerte</option>
                    <option value="menu">🍽️ Menu del giorno</option>
                    <option value="marketplace">📦 Vendi</option>
                    <option value="guasto">🛠️ Segnala Guasto</option>
                </select>
                
                <div class="btn-dual">
                    <button class="btn-action" onclick="document.getElementById('cameraInput').click()">📸 Scatta</button>
                    <button class="btn-action" onclick="document.getElementById('fileInput').click()">📁 Carica</button>
                </div>
            </div>

            <div id="step2" class="hidden">
                <img id="preview" style="width:100%; border-radius:10px;">
                <input type="text" id="titolo" class="form-input" placeholder="Titolo">
                <textarea id="descrizione" class="form-input" placeholder="Descrizione"></textarea>
                <input type="number" id="prezzo" class="form-input" placeholder="Prezzo (€)">
                <button class="form-input" style="background:var(--accent); color:white;" onclick="pubblicaPost()">✅ Pubblica</button>
            </div>
        </div>
    </div>

    <input type="file" id="cameraInput" class="hidden" accept="image/*" capture="environment" onchange="mostraAnteprima(event)">
    <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="mostraAnteprima(event)">

    <script type="module">
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-storage.js";
        
        let fileTemporaneo = null;
        const storage = getStorage();

        window.mostraAnteprima = (e) => {
            fileTemporaneo = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('preview').src = ev.target.result;
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
            };
            reader.readAsDataURL(fileTemporaneo);
        };

        window.pubblicaPost = async () => {
            if (!fileTemporaneo) return;
            
            // 1. UPLOAD SU STORAGE (Qui risolviamo il problema del caricamento)
            const storageRef = ref(storage, 'posts/' + Date.now() + '.jpg');
            const snapshot = await uploadBytes(storageRef, fileTemporaneo);
            const url = await getDownloadURL(snapshot.ref);

            // 2. SALVATAGGIO IN FIRESTORE
            // ... (logica addDoc con url come valore del campo foto) ...
            alert("Pubblicato! URL Foto: " + url);
            location.reload();
        };
    </script>
</body>
</html>
