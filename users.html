<header>
    <img src="logo.png" alt="Logo">
</header>

<main id="container-modulo">
    <div id="vista-login">
        <h3>Accedi con il tuo PIN</h3>
        <input type="password" id="pin-login" placeholder="Inserisci il tuo PIN">
        <button onclick="eseguiAccesso()">Entra</button>
        <p onclick="mostraRegistrazione()">Non hai un account? Registrati qui</p>
    </div>

    <div id="vista-registrazione" style="display:none;">
        <h3>Registrazione Nuova Attività</h3>
        <input type="text" id="nome" placeholder="Nome Attività">
        <input type="text" id="telefono" placeholder="Telefono">
        <input type="password" id="pin-nuovo" placeholder="Crea un PIN">
        <button onclick="eseguiRegistrazione()">Crea Account</button>
        <p onclick="mostraLogin()">Hai già un account? Accedi</p>
    </div>
</main>
