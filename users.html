<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoLiA | Profilo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blu: #3b5998; --giallo: #ffc107; --viola: #6f42c1; --bg: #f3f3f3; }
        body { font-family: 'Segoe UI', system-ui; margin: 0; background: var(--bg); padding-bottom: 90px; }
        header { background: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--blu); }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid var(--blu); z-index: 90; }
        .nav-item { text-decoration: none; color: var(--blu); text-align: center; flex: 1; font-size: 11px; cursor: pointer; }
        .nav-item i { display: block; font-size: 1.3rem; margin-bottom: 3px; }
        .box-centrale { max-width: 400px; margin: 20px auto; padding: 20px; background: white; border-radius: 15px; border-top: 5px solid var(--giallo); }
        .form-input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-action { padding: 12px; border: none; border-radius: 8px; background: var(--blu); color: white; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .link-switch { display: block; margin-top: 15px; color: var(--viola); cursor: pointer; font-size: 14px; text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header><img src="logo.png" style="height:35px;"><i class="fa-solid fa-user-circle" style="color: var(--blu);"></i></header>

    <div class="box-centrale">
        <div id="div-login">
            <h3 style="color:var(--blu)">Accedi</h3>
            <input type="password" id="login-pin" class="form-input" placeholder="Inserisci il tuo PIN">
            <button class="btn-action" onclick="eseguiAccesso()">Entra</button>
            <span class="link-switch" onclick="toggleForm()">Non sei registrato? Registrati qui</span>
        </div>

        <div id="div-registra" class="hidden">
            <h3 style="color:var(--viola)">Registrazione</h3>
            <input type="text" id="reg-nome" class="form-input" placeholder="Nome Attività">
            <input type="text" id="reg-tel" class="form-input" placeholder="Telefono">
            <input type="password" id="reg-pin" class="form-input" placeholder="Crea un PIN">
            <button class="btn-action" style="background:var(--viola)" onclick="eseguiRegistrazione()">Crea Account</button>
            <span class="link-switch" onclick="toggleForm()">Hai già un account? Accedi</span>
        </div>
    </div>

    <nav class="nav-bottom">
        <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i>Home</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-filter"></i>Filtri</a>
        <a href="maps.html" class="nav-item"><i class="fa-solid fa-map-marked-alt"></i>Mappa</a>
        <a href="users.html" class="nav-item" style="color:var(--viola)"><i class="fa-solid fa-user"></i>Profilo</a>
        <a href="admin.html" class="nav-item"><i class="fa-solid fa-chart-line"></i>Admin</a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDAJIxBD8qGO6h8lAZeLnotm7GySpZrz_8", authDomain: "geolia-app.firebaseapp.com", projectId: "geolia-app", storageBucket: "geolia-app.firebasestorage.app", messagingSenderId: "341223455235", appId: "1:341223455235:web:6baa3fd3b9db6eaa22ec36", measurementId: "G-7SPH65RFH7" };
        const db = getFirestore(initializeApp(firebaseConfig));

        window.toggleForm = () => {
            document.getElementById('div-login').classList.toggle('hidden');
            document.getElementById('div-registra').classList.toggle('hidden');
        };

        window.eseguiRegistrazione = async () => {
            const nome = document.getElementById('reg-nome').value;
            const tel = document.getElementById('reg-tel').value;
            const pin = document.getElementById('reg-pin').value;
            const slug = "ch-ti-" + nome.toLowerCase().replace(/ /g, '-');
            
            try {
                await setDoc(doc(db, "users", slug), {
                    nome_attivita: nome,
                    telefono: tel,
                    pin: pin,
                    ruolo: "utente",
                    url_pagina: slug
                });
                alert("Registrato correttamente!");
                // Reindirizza a index.html con il parametro dell'utente
                window.location.href = "index.html?user=" + slug;
            } catch (e) { alert("Errore: " + e.message); }
        };

        window.eseguiAccesso = async () => {
            const pinInserito = document.getElementById('login-pin').value;
            if (!pinInserito) return alert("Inserisci il PIN");

            try {
                const q = query(collection(db, "users"), where("pin", "==", pinInserito));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const dati = querySnapshot.docs[0].data();
                    localStorage.setItem("geolia_user", JSON.stringify(dati));
                    alert("Bentornato " + dati.nome_attivita);
                    // Reindirizza a index.html con il parametro dell'utente
                    window.location.href = "index.html?user=" + dati.url_pagina;
                } else {
                    alert("PIN non valido.");
                }
            } catch (e) { alert("Errore: " + e.message); }
        };
    </script>
</body>
</html>
